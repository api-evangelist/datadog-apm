aid: datadog-apm
name: Datadog APM
description: >-
  Datadog APM provides end-to-end distributed tracing, continuous profiling, and
  real-time performance monitoring for applications and microservices. It
  automatically instruments applications to provide deep visibility into request
  traces, latency, and error rates across distributed systems.
